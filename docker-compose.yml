version: '3.8'

services:
  # ------ SERVICIO FRONTEND ------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nominarrhh-frontend
    env_file:
      - .env
    ports:
      - "${FRONTEND_PORT:-3000}:${FRONTEND_PORT:-3000}"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    restart: always

  # ------ SERVICIO BACKEND ------
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: nominarrhh-backend
    env_file:
      - .env
    ports:
      - "${BACKEND_PORT:-8000}:${BACKEND_PORT:-8000}"
    volumes:
      - ./backend:/app
    restart: always
    depends_on:
      db:
        condition: service_healthy  # Espera hasta que Postgres esté listo de verdad
      redis:
        condition: service_started

  # ------ SERVICIO BASE DE DATOS ------
  db:
    build:
      context: ./dbNominaRRHH
      dockerfile: Dockerfile
    container_name: nominarrhh-db
    env_file:
      - .env
    command: postgres -p ${DB_PORT:-5432}
    environment:
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - ./dbNominaRRHH:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:${DB_PORT:-5432}"
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-nominarrhh_db} -p ${DB_PORT:-5432}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ------ SERVICIO DE CACHÉ (REDIS) ------
  redis:
    image: redis:7-alpine
    container_name: nominarrhh-redis
    env_file:
      - .env
    ports:
      - "${REDIS_PORT:-6379}:6379"
    restart: always

  # ------ WORKER CELERY (PROCESADOR ASÍNCRONO) ------
  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nominarrhh-celery
    command: celery -A core worker -l info
    env_file:
      - .env
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      backend:
        condition: service_started
    restart: always

  # ------ CELERY BEAT (PROGRAMADOR DE TAREAS) ------
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nominarrhh-celery-beat
    command: celery -A core beat -l info
    env_file:
      - .env
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      celery:
        condition: service_started
    restart: always
